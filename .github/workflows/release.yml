name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    environment: production
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: AI-Template/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            AI-Template/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: AI-Template

      - name: Audit frontend dependencies
        # Run once — only on the Linux runner (same result on all platforms)
        if: matrix.platform == 'ubuntu-22.04'
        run: npm audit --audit-level=high
        working-directory: AI-Template

      - name: Build and publish release
        # Pin to a specific commit SHA for supply-chain safety.
        # To update: check https://github.com/tauri-apps/tauri-action/releases
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS code signing & notarisation ──────────────────────────────
          # Add these in GitHub → Settings → Environments → production → Secrets
          # APPLE_CERTIFICATE:           base64-encoded .p12 Developer ID certificate
          # APPLE_CERTIFICATE_PASSWORD:  password for the .p12 file
          # APPLE_SIGNING_IDENTITY:      e.g. "Developer ID Application: Your Name (TEAMID)"
          # APPLE_ID:                    your Apple ID email
          # APPLE_PASSWORD:              app-specific password from appleid.apple.com
          # APPLE_TEAM_ID:               your 10-character Apple team ID
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows code signing ────────────────────────────────────────────
          # TAURI_SIGNING_PRIVATE_KEY:          EV certificate private key (base64)
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD:  password for the key
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: AI-Template
          tagName: ${{ github.ref_name }}
          releaseName: AI Docs Generator ${{ github.ref_name }}
          releaseBody: Download the installer for your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
