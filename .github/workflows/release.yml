name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    environment: production
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: AI-Template/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            AI-Template/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: AI-Template

      - name: Audit frontend dependencies
        # Run once — only on the Linux runner (same result on all platforms)
        if: matrix.platform == 'ubuntu-22.04'
        run: npm audit --audit-level=high
        working-directory: AI-Template

      - name: Build and publish release
        # Pin to a specific commit SHA for supply-chain safety.
        # To update: check https://github.com/tauri-apps/tauri-action/releases
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: AI-Template
          tagName: ${{ github.ref_name }}
          releaseName: AI Docs Generator ${{ github.ref_name }}
          releaseBody: Download the installer for your platform below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
