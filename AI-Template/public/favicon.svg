<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0c0118"/>

  <!-- Back document -->
  <rect x="4" y="7" width="14" height="19" rx="1.5" fill="#1c0b46"
        transform="rotate(-7 11 16)"/>

  <!-- Middle document -->
  <rect x="7" y="6" width="14" height="19" rx="1.5" fill="#22104e"
        transform="rotate(-2 14 15)"/>

  <!-- Front document body -->
  <rect x="10" y="5" width="14" height="20" rx="1.5" fill="#2a1260"/>
  <!-- Front document border -->
  <rect x="10" y="5" width="14" height="20" rx="1.5" fill="none"
        stroke="#7c3aff" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- Header band -->
  <rect x="10" y="5"  width="14" height="6"  rx="1.5" fill="#4c1d95"/>
  <rect x="10" y="9"  width="14" height="2"  fill="#4c1d95"/>

  <!-- Content lines -->
  <rect x="12" y="14"   width="9"  height="1.5" rx="0.75" fill="rgba(255,255,255,0.28)"/>
  <rect x="12" y="17"   width="7"  height="1.5" rx="0.75" fill="rgba(255,255,255,0.18)"/>
  <rect x="12" y="20"   width="9"  height="1.5" rx="0.75" fill="rgba(255,255,255,0.28)"/>

  <!-- Lightning bolt (bottom-right, overlapping doc corner) -->
  <path d="M23 17 L19 22.5 H21.5 L20 27 L25.5 21 H22.5 Z" fill="#c4b5fd"/>
</svg>
